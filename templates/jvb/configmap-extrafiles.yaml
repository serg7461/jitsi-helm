{{- if .Values.jvb.extraFiles }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "jitsi-meet.jvb.fullname" . }}-extrafiles
  labels:
    {{- include "jitsi-meet.jvb.labels" . | nindent 4 }}
data:
  {{- range $i, $f := .Values.jvb.extraFiles }}
  extrafile-{{ $i }}: |
    {{- $f.content | nindent 4 }}
  {{- end }}
{{- end }}
