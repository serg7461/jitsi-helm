{{- if and
       .Values.jibri.enabled
       (not .Values.jibri.useExternalJibri)
       .Values.jibri.extraFiles
}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "jitsi-meet.jibri.fullname" . }}-extrafiles
  labels:
    {{- include "jitsi-meet.jibri.labels" . | nindent 4 }}
data:
  {{- range $i, $f := .Values.jibri.extraFiles }}
  extrafile-{{ $i }}: |
    {{- $f.content | nindent 4 }}
  {{- end }}
{{- end }}
