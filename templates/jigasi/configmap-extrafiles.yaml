{{- if and
       .Values.jigasi.enabled
       (not .Values.jigasi.useExternalJigasi)
       .Values.jigasi.extraFiles
}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "jitsi-meet.jigasi.fullname" . }}-extrafiles
  labels:
    {{- include "jitsi-meet.jigasi.labels" . | nindent 4 }}
data:
  {{- range $i, $f := .Values.jigasi.extraFiles }}
  extrafile-{{ $i }}: |
    {{- $f.content | nindent 4 }}
  {{- end }}
{{- end }}
